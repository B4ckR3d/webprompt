<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', system-ui, sans-serif; background: #fafaf9; color: #1c1917; overflow: hidden; }
.nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; }
.logo { font-weight: 700; font-size: 16px; }
.nav-links { display: flex; gap: 20px; font-size: 12px; color: #57534e; }
.hero { padding: 40px 24px 20px; }
.hero-sub { font-size: 11px; color: #a8a29e; margin-bottom: 6px; }
h1 { font-size: 32px; font-weight: 800; line-height: 1.1; margin-bottom: 10px; }
.hero-desc { font-size: 12px; color: #57534e; max-width: 400px; line-height: 1.5; }
.gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 15px 24px; }
.gallery-item { border-radius: 8px; overflow: hidden; aspect-ratio: 4/3; }
.gallery-item.large { grid-column: span 2; grid-row: span 2; }
.gallery-img { width: 100%; height: 100%; object-fit: cover; }
.gallery-1 { background: linear-gradient(135deg, #667eea, #764ba2); }
.gallery-2 { background: linear-gradient(135deg, #f093fb, #f5576c); }
.gallery-3 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
.gallery-4 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
.gallery-5 { background: linear-gradient(135deg, #fa709a, #fee140); }
.tags { display: flex; gap: 6px; padding: 0 24px 15px; flex-wrap: wrap; }
.tag { padding: 4px 10px; background: white; border: 1px solid #e7e5e4; border-radius: 6px; font-size: 10px; color: #57534e; }
</style>
</head>
<body>
<div class="nav">
  <div class="logo">John Doe</div>
  <div class="nav-links">
    <span>Work</span>
    <span>About</span>
    <span>Blog</span>
    <span>Contact</span>
  </div>
</div>
<div class="hero">
  <div class="hero-sub">Creative Developer & Designer</div>
  <h1>Crafting Digital<br>Experiences</h1>
  <div class="hero-desc">I design and build beautiful websites, applications, and digital products that delight users and drive results.</div>
</div>
<div class="tags">
  <div class="tag">Web Design</div>
  <div class="tag">UI/UX</div>
  <div class="tag">React</div>
  <div class="tag">Next.js</div>
  <div class="tag">TypeScript</div>
</div>
<div class="gallery">
  <div class="gallery-item large"><div class="gallery-img gallery-1"></div></div>
  <div class="gallery-item"><div class="gallery-img gallery-2"></div></div>
  <div class="gallery-item"><div class="gallery-img gallery-3"></div></div>
  <div class="gallery-item"><div class="gallery-img gallery-4"></div></div>
  <div class="gallery-item"><div class="gallery-img gallery-5"></div></div>
</div>
</body>
</html>
