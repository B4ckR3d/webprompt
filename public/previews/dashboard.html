<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; color: #1e293b; display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 200px; background: #1e293b; color: white; padding: 16px; display: flex; flex-direction: column; }
.logo { font-weight: 700; font-size: 14px; margin-bottom: 24px; display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 24px; height: 24px; background: #6366f1; border-radius: 6px; }
.nav-item { padding: 8px 12px; border-radius: 6px; font-size: 12px; color: #94a3b8; margin-bottom: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.nav-item.active { background: rgba(99,102,241,0.2); color: #a5b4fc; }
.nav-icon { width: 16px; height: 16px; background: currentColor; border-radius: 4px; opacity: 0.5; }
.main { flex: 1; padding: 20px; overflow-y: auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
h2 { font-size: 18px; font-weight: 700; }
.date { font-size: 11px; color: #64748b; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px; }
.stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 22px; font-weight: 700; margin: 4px 0; }
.stat-change { font-size: 10px; color: #22c55e; }
.charts { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
.chart-card { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px; }
.chart-title { font-size: 12px; font-weight: 600; margin-bottom: 12px; }
.chart-area { height: 120px; display: flex; align-items: flex-end; gap: 4px; }
.bar { flex: 1; background: #6366f1; border-radius: 3px 3px 0 0; opacity: 0.8; }
.bar:nth-child(even) { background: #818cf8; }
.donut { width: 80px; height: 80px; border-radius: 50%; background: conic-gradient(#6366f1 0% 45%, #818cf8 45% 70%, #c084fc 70% 85%, #e2e8f0 85% 100%); margin: 20px auto; position: relative; }
.donut::after { content: ''; position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: white; border-radius: 50%; transform: translate(-50%, -50%); }
.table { margin-top: 12px; }
.row { display: flex; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 11px; }
.row-header { color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 9px; letter-spacing: 0.5px; }
.cell { flex: 1; }
.cell:first-child { flex: 2; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 500; }
.badge-green { background: #dcfce7; color: #16a34a; }
.badge-yellow { background: #fef9c3; color: #ca8a04; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo"><div class="logo-icon"></div> Dashboard</div>
  <div class="nav-item active"><div class="nav-icon"></div> Overview</div>
  <div class="nav-item"><div class="nav-icon"></div> Analytics</div>
  <div class="nav-item"><div class="nav-icon"></div> Customers</div>
  <div class="nav-item"><div class="nav-icon"></div> Products</div>
  <div class="nav-item"><div class="nav-icon"></div> Settings</div>
</div>
<div class="main">
  <div class="header">
    <div>
      <h2>Dashboard</h2>
      <div class="date">Welcome back, Admin</div>
    </div>
    <div style="background:#6366f1;color:white;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:500">+ Add New</div>
  </div>
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Revenue</div>
      <div class="stat-value">$45,231</div>
      <div class="stat-change">↑ 20.1% from last month</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Users</div>
      <div class="stat-value">2,350</div>
      <div class="stat-change">↑ 180 new users</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Sales</div>
      <div class="stat-value">1,210</div>
      <div class="stat-change">↑ 19% from last month</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active</div>
      <div class="stat-value">573</div>
      <div class="stat-change">↑ 201 active now</div>
    </div>
  </div>
  <div class="charts">
    <div class="chart-card">
      <div class="chart-title">Revenue Overview</div>
      <div class="chart-area">
        <div class="bar" style="height:40%"></div>
        <div class="bar" style="height:65%"></div>
        <div class="bar" style="height:50%"></div>
        <div class="bar" style="height:80%"></div>
        <div class="bar" style="height:55%"></div>
        <div class="bar" style="height:70%"></div>
        <div class="bar" style="height:90%"></div>
        <div class="bar" style="height:60%"></div>
        <div class="bar" style="height:75%"></div>
        <div class="bar" style="height:85%"></div>
        <div class="bar" style="height:95%"></div>
        <div class="bar" style="height:100%"></div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Traffic Sources</div>
      <div class="donut"></div>
    </div>
  </div>
</div>
</body>
</html>
