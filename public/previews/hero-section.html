<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', system-ui, sans-serif; background: #0f172a; color: white; overflow: hidden; }
.nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; background: rgba(15,23,42,0.8); backdrop-filter: blur(10px); position: absolute; top: 0; left: 0; right: 0; z-index: 10; }
.logo { font-weight: 700; font-size: 14px; }
.nav-links { display: flex; gap: 16px; font-size: 11px; color: #94a3b8; }
.cta-nav { background: #6366f1; color: white; padding: 6px 14px; border-radius: 6px; font-size: 11px; font-weight: 500; }
.hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 40px; position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; top: 50%; left: 50%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(99,102,241,0.3) 0%, transparent 70%); transform: translate(-50%, -50%); animation: pulse 4s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.2); } }
.badge { background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.3); color: #a5b4fc; padding: 4px 12px; border-radius: 20px; font-size: 11px; margin-bottom: 16px; position: relative; z-index: 1; }
h1 { font-size: 36px; font-weight: 800; line-height: 1.1; margin-bottom: 12px; position: relative; z-index: 1; }
.gradient-text { background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
p { color: #94a3b8; font-size: 13px; max-width: 400px; margin: 0 auto 20px; line-height: 1.5; position: relative; z-index: 1; }
.buttons { display: flex; gap: 10px; position: relative; z-index: 1; }
.btn-primary { background: #6366f1; color: white; padding: 10px 20px; border-radius: 8px; font-size: 12px; font-weight: 600; }
.btn-secondary { background: transparent; border: 1px solid #334155; color: white; padding: 10px 20px; border-radius: 8px; font-size: 12px; font-weight: 500; }
.stats { display: flex; gap: 30px; margin-top: 30px; position: relative; z-index: 1; }
.stat { text-align: center; }
.stat-value { font-size: 20px; font-weight: 700; }
.stat-label { font-size: 10px; color: #64748b; margin-top: 2px; }
.float-1 { position: absolute; top: 20%; right: 15%; width: 60px; height: 60px; border: 2px solid rgba(99,102,241,0.3); border-radius: 50%; animation: spin 8s linear infinite; }
.float-2 { position: absolute; bottom: 25%; left: 10%; width: 40px; height: 40px; background: rgba(99,102,241,0.1); border-radius: 8px; animation: bounce 3s ease-in-out infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
</style>
</head>
<body>
<div class="nav">
  <div class="logo">YourBrand</div>
  <div class="nav-links">
    <span>Features</span>
    <span>Pricing</span>
    <span>About</span>
  </div>
  <div class="cta-nav">Get Started</div>
</div>
<div class="hero">
  <div class="float-1"></div>
  <div class="float-2"></div>
  <div class="badge">🚀 Launching Soon</div>
  <h1>Build the <span class="gradient-text">Future</span><br>of Your Business</h1>
  <p>Cutting-edge solutions for modern teams. Ship faster with our AI-powered platform.</p>
  <div class="buttons">
    <div class="btn-primary">Get Started Free →</div>
    <div class="btn-secondary">Watch Demo</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-value">10K+</div><div class="stat-label">Users</div></div>
    <div class="stat"><div class="stat-value">99.9%</div><div class="stat-label">Uptime</div></div>
    <div class="stat"><div class="stat-value">50M+</div><div class="stat-label">Requests</div></div>
  </div>
</div>
</body>
</html>
