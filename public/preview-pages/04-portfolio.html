<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#fafaf9;color:#1c1917;overflow:hidden}
.nav{display:flex;justify-content:space-between;align-items:center;padding:16px 32px}
.logo{font-weight:800;font-size:18px}
.nav-links{display:flex;gap:24px;font-size:13px;color:#57534e}
.hero{padding:40px 32px 20px}
.sub{font-size:12px;color:#a8a29e;margin-bottom:8px;text-transform:uppercase;letter-spacing:2px}
h1{font-size:44px;font-weight:900;line-height:1.05;margin-bottom:14px}
.desc{font-size:14px;color:#57534e;max-width:500px;line-height:1.6}
.tags{display:flex;gap:8px;padding:0 32px 20px;flex-wrap:wrap}
.tag{padding:6px 14px;background:white;border:1px solid #e7e5e4;border-radius:8px;font-size:12px;color:#57534e}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 32px 32px}
.item{border-radius:10px;overflow:hidden;aspect-ratio:4/3}
.item.large{grid-column:span 2;grid-row:span 2}
.g1{background:linear-gradient(135deg,#667eea,#764ba2)}
.g2{background:linear-gradient(135deg,#f093fb,#f5576c)}
.g3{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.g4{background:linear-gradient(135deg,#43e97b,#38f9d7)}
.g5{background:linear-gradient(135deg,#fa709a,#fee140)}
</style></head><body>
<div class="nav"><div class="logo">ALEX CHEN</div><div class="nav-links"><span>Work</span><span>About</span><span>Blog</span><span>Contact</span></div></div>
<div class="hero"><div class="sub">Creative Developer & Designer</div><h1>Crafting Digital<br>Experiences</h1><div class="desc">I design and build beautiful websites, applications, and digital products that delight users.</div></div>
<div class="tags"><div class="tag">Web Design</div><div class="tag">UI/UX</div><div class="tag">React</div><div class="tag">Next.js</div><div class="tag">TypeScript</div></div>
<div class="gallery"><div class="item large"><div style="width:100%;height:100%;background:linear-gradient(135deg,#667eea,#764ba2)"></div></div><div class="item"><div style="width:100%;height:100%;background:linear-gradient(135deg,#f093fb,#f5576c)"></div></div><div class="item"><div style="width:100%;height:100%;background:linear-gradient(135deg,#4facfe,#00f2fe)"></div></div><div class="item"><div style="width:100%;height:100%;background:linear-gradient(135deg,#43e97b,#38f9d7)"></div></div><div class="item"><div style="width:100%;height:100%;background:linear-gradient(135deg,#fa709a,#fee140)"></div></div></div>
</body></html>
